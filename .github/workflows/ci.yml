name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-build:
    name: Backend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore TaleTrackApp/TaleTrackApp.csproj

      - name: Build
        run: dotnet build TaleTrackApp/TaleTrackApp.csproj --no-restore -c Release

  frontend-lint-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: taletrack-frontend
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: taletrack-frontend
        run: bun run lint

      - name: Build
        working-directory: taletrack-frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api
          NEXT_PUBLIC_INTERNAL_API_KEY: ci-placeholder
        run: bun run build

  netflix-extension-build:
    name: Netflix Extension — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: taletrack-netflix-extension
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: taletrack-netflix-extension
        run: bun run build.ts

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-lint-build, netflix-extension-build]
    steps:
      - uses: actions/checkout@v5

      - name: Build backend image
        run: docker build -t taletrack-backend ./TaleTrackApp

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:8080/api \
            --build-arg NEXT_PUBLIC_INTERNAL_API_KEY=ci-placeholder \
            -t taletrack-frontend \
            ./taletrack-frontend
