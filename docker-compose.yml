services:
  postgres:
    image: postgres:15-alpine
    container_name: mediatracker-db
    restart: unless-stopped
    environment:  
      POSTGRES_USER:  ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:  
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:  ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: mediatracker-migrator
    working_dir: /src/MediaTrackerApp
    profiles:
      - db
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./MediaTrackerApp:/src/MediaTrackerApp
    command:
      - /bin/sh
      - -lc
      - dotnet tool install --global dotnet-ef --version "10.0.*" && export PATH="$$PATH:/root/.dotnet/tools" && dotnet restore && dotnet ef database update --project MediaTrackerApp.csproj --startup-project MediaTrackerApp.csproj
    restart: "no"

  backend:
    build:
      context: ./MediaTrackerApp
      dockerfile: Dockerfile
    container_name: mediatracker-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JwtSettings__Secret: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./mediatracker-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api
        NEXT_PUBLIC_INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    container_name: mediatracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      NEXT_PUBLIC_INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env}
    ports:
      - "8090:3000"

volumes:
  postgres_data: 