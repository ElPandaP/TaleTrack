services:
  postgres:
    image: postgres:15-alpine
    container_name: taletrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:  ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:  ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: taletrack-migrator
    working_dir: /src/TaleTrackApp
    profiles:
      - db
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./TaleTrackApp:/src/TaleTrackApp
    command:
      - /bin/sh
      - -lc
      - dotnet tool install --global dotnet-ef --version "10.0.*" && export PATH="$$PATH:/root/.dotnet/tools" && dotnet restore && dotnet ef database update --project TaleTrackApp.csproj --startup-project TaleTrackApp.csproj
    restart: "no"

  backend:
    build:
      context: ./TaleTrackApp
      dockerfile: Dockerfile
    container_name: taletrack-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JwtSettings__Secret: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      RESEND_API_KEY: ${RESEND_API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8090}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./taletrack-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must be set in .env}
        NEXT_PUBLIC_INTERNAL_API_KEY: ${INTERNAL_API_KEY}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID must be set in .env}
    container_name: taletrack-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must be set in .env}
      NEXT_PUBLIC_INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID must be set in .env}
      INTERNAL_API_URL: http://backend:8080/api
    ports:
      - "8090:3000"

  dozzle:
    image: amir20/dozzle:latest
    container_name: taletrack-logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:9999:8080"
    restart: unless-stopped

volumes:
  postgres_data:
