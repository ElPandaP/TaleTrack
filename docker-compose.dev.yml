services:
  postgres:
    image: postgres:15-alpine
    container_name: taletrack-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: taletrack-backend-dev
    working_dir: /src
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JwtSettings__Secret: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      RESEND_API_KEY: ${RESEND_API_KEY}
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
    volumes:
      - ./TaleTrackApp:/src
      - nuget_cache:/root/.nuget/packages
    ports:
      - "8080:8080"
    command: dotnet watch run --urls http://0.0.0.0:8080

  frontend:
    image: oven/bun:1-alpine
    container_name: taletrack-frontend-dev
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      NEXT_PUBLIC_INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      # --no-turbopack usa webpack, que sí respeta WATCHPACK_POLLING en Docker/Windows
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./taletrack-frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "8090:3000"
    command: sh -c "bun install && bun dev --webpack"

volumes:
  postgres_data_dev:
  nuget_cache:
